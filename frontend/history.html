<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>History</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<nav class="navbar">
  <h2>📊 Dashboard</h2>
  <a href="index.html">Back</a>
</nav>

<div class="container">
  <div class="card">

    <h2>Previous Analyses</h2>

    <div id="historyList"></div>

    <div class="chart-box">
      <canvas id="rankChart"></canvas>
    </div>

  </div>
</div>

<script>
const API = "https://ai-powered-recruitment-production.up.railway.app";

async function loadHistory() {
  const res = await fetch(API + "/api/history");
  const data = await res.json();

  const list = document.getElementById("historyList");

  list.innerHTML = data.map(d => `
    <div class="history-card">
      <span>${d.name}</span>
      <span>${d.score}%</span>
    </div>
  `).join("");

  const ranks = {Elite:0, Gold:0, Silver:0, Bronze:0};

  data.forEach(d=>{
    if(d.rank.includes("Elite")) ranks.Elite++;
    else if(d.rank.includes("Gold")) ranks.Gold++;
    else if(d.rank.includes("Silver")) ranks.Silver++;
    else ranks.Bronze++;
  });

  new Chart(document.getElementById("rankChart"), {
    type: "bar",
    data: {
      labels: Object.keys(ranks),
      datasets: [{
        data: Object.values(ranks),
        backgroundColor: ["#6366f1","#22c55e","#f59e0b","#ef4444"]
      }]
    }
  });
}

loadHistory();
</script>

</body>
</html>
